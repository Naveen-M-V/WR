<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000814" />
    <meta name="description" content="Which Renewables - Your trusted digital hub for renewable energy professionals across the UK & Ireland. Connect with innovators, businesses, and sustainable energy solutions." />
    <meta name="keywords" content="renewable energy, UK, Ireland, sustainability, green energy, solar, wind, clean energy" />
    
    <!-- Performance: DNS Prefetch & Preconnect -->
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://img.freepik.com" />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="preconnect" href="https://img.freepik.com" crossorigin />
    
    <!-- PWA -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Optimized Title -->
    <title>Which Renewables</title>
    
    <!-- Performance: Critical CSS Inline (minimal loading screen) -->
    <style>
      #root{min-height:100vh;background-color:#000814}
      .loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background-color:#000814}
      .loading-spinner{width:48px;height:48px;border:4px solid rgba(126,217,87,0.3);border-top-color:#7ed957;border-radius:50%;animation:spin 0.8s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <!-- Loading screen while JS loads -->
      <div class="loading-screen">
        <div class="loading-spinner"></div>
      </div>
    </div>

  </body>
</html>
